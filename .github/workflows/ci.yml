name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test + eval)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: amd_user
          POSTGRES_PASSWORD: amd_pass
          POSTGRES_DB: ask_my_docs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U amd_user -d ask_my_docs_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://amd_user:amd_pass@localhost:5432/ask_my_docs_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-for-ci
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://localhost:11434

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          cd backend
          ruff check app tasks tests
          ruff format --check app tasks tests

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Unit tests
        run: |
          cd backend
          pytest tests/ -v --ignore=tests/eval -x

      - name: RAG eval gate
        run: |
          cd backend
          pytest tests/eval/ -v --tb=short

  frontend:
    name: Frontend (typecheck + lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npm run typecheck

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build
