name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
